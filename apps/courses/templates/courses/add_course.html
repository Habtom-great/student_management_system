{% extends "base.html" %}
{% load static %}

{% block title %}Add Course{% endblock %}

{% block content %}

<div class="container py-3" style="max-width: 720px;">

    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold mb-0">
            <i class="bi bi-journal-plus text-primary me-2"></i>Add Course
        </h5>
        <a href="{% url 'courses:manage_courses' %}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Back
        </a>
    </div>

    <!-- Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success d-flex align-items-center py-2 px-3 small mb-3">
                <i class="bi bi-check-circle-fill me-2"></i>{{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <!-- Form Card -->
    <div class="card border-0 shadow-sm rounded-3">
        <div class="card-body p-3 p-md-4">

            <form method="POST" enctype="multipart/form-data" novalidate>
                {% csrf_token %}

                <div class="row g-3">

                    <!-- Thumbnail Preview -->
                    <div class="col-md-4 text-center">
                        <label class="form-label small fw-semibold mb-1 d-block text-start">Thumbnail</label>

                        <div class="border rounded-3 bg-light d-flex align-items-center justify-content-center mb-2 overflow-hidden"
                             style="height: 150px;">
                            <img id="thumbnailPreview" src="#" alt="Preview"
                                 class="d-none w-100 h-100" style="object-fit: cover;">
                            <i id="thumbnailPlaceholder" class="bi bi-image text-secondary" style="font-size: 2rem;"></i>
                        </div>

                        <input type="file" name="thumbnail" id="thumbnailInput"
                               class="form-control form-control-sm" accept="image/*" onchange="previewThumbnail(event)">
                        <div class="form-text small">1280×720px, JPG/PNG</div>
                    </div>

                    <!-- Course Fields -->
                    <div class="col-md-8">
                        <div class="row g-2">

                            <div class="col-12">
                                <label class="form-label small fw-semibold mb-1">Course Code</label>
                                <input type="text" name="code" class="form-control form-control-sm" placeholder="e.g. CS101" required>
                            </div>

                            <div class="col-12">
                                <label class="form-label small fw-semibold mb-1">Course Name</label>
                                <input type="text" name="title" class="form-control form-control-sm" placeholder="e.g. Introduction to Programming" required>
                            </div>

                            <div class="col-md-8">
                                <label class="form-label small fw-semibold mb-1">Instructor</label>
                                <select name="instructor" class="form-select form-select-sm">
                                    <option value="">Unassigned</option>
                                    <option value="hailu_worku">Dr. Hailu Worku</option>
                                    <option value="selam_tadesse">Dr. Selam Tadesse</option>
                                    <option value="daniel_bekele">Mr. Daniel Bekele</option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label small fw-semibold mb-1">Credits</label>
                                <input type="number" name="credits" class="form-control form-control-sm" min="1" max="10" placeholder="3">
                            </div>

                        </div>
                    </div>

                </div>

                <div class="d-flex justify-content-end gap-2 mt-3 pt-2 border-top">
                    <a href="{% url 'courses:manage_courses' %}" class="btn btn-light btn-sm px-3">Cancel</a>
                    <button type="submit" class="btn btn-primary btn-sm px-3">
                        <i class="bi bi-check2-circle me-1"></i>Add Course
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

<script>
function previewThumbnail(event) {
    const file = event.target.files[0];
    const preview = document.getElementById('thumbnailPreview');
    const placeholder = document.getElementById('thumbnailPlaceholder');

    if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
            preview.src = e.target.result;
            preview.classList.remove('d-none');
            placeholder.classList.add('d-none');
        };
        reader.readAsDataURL(file);
    }
}
</script>

{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{height:100vh;display:flex;justify-content:center;align-items:center;background:#0f172a}
.card{width:380px;padding:25px;border-radius:15px}
</style>
</head>
<body>

<div class="card shadow">

<h3 class="text-center mb-3">📘 LMS Login</h3>

{% if messages %}
{% for message in messages %}
<div class="alert alert-{{ message.tags }} alert-dismissible fade show">
{{ message }}
<button class="btn-close" data-bs-dismiss="alert"></button>
</div>
{% endfor %}
{% endif %}

<form method="post" action="{% url 'accounts:login' %}">
{% csrf_token %}

<input type="email" name="email" class="form-control mb-3" placeholder="Email Address" required>

<input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

<div class="d-flex justify-content-between mb-3">
<div class="form-check">
<input class="form-check-input" type="checkbox" name="remember">
<label class="form-check-label">Remember</label>
</div>

<a href="{% url 'accounts:password_reset' %}" class="small">Forgot?</a>
</div>

<button class="btn btn-primary w-100">Login</button>

<p class="text-center mt-3 mb-0">
No account?
<a href="{% url 'accounts:register' %}">Register</a>
</p>

</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

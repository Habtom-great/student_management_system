<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{height:100vh;display:flex;justify-content:center;align-items:center;background:#0f172a}
.card{width:400px;padding:25px;border-radius:15px}
</style>
</head>
<body>

<div class="card shadow">

<h3 class="text-center mb-3">🎓 Create Account</h3>

{% if messages %}
{% for message in messages %}
<div class="alert alert-{{ message.tags }} alert-dismissible fade show">
{{ message }}
<button class="btn-close" data-bs-dismiss="alert"></button>
</div>
{% endfor %}
{% endif %}

<form method="post" action="{% url 'accounts:register' %}">
{% csrf_token %}

<input type="text" name="full_name" class="form-control mb-2" placeholder="Full Name" required>

<input type="email" name="email" class="form-control mb-2" placeholder="Email Address" required>

<input type="password" name="password1" class="form-control mb-2" placeholder="Password" required>

<input type="password" name="password2" class="form-control mb-3" placeholder="Confirm Password" required>

<button class="btn btn-success w-100">Register</button>

<p class="text-center mt-3 mb-0">
Already have an account?
<a href="{% url 'accounts:login' %}">Login</a>
</p>

</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

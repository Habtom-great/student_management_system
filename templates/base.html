{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Courses Admin kkkkk | AA{% endblock %}</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f7fc;
      padding-top: 56px;
    }

    .navbar-dark { background-color: #1f1f2e; }
    .navbar-brand { font-weight: bold; font-size: 1.5rem; }
    .offcanvas { background-color: #2c2f48; color: #fff; }
    .nav-link { color: #fff !important; font-size: 1.05rem; }
    .nav-link:hover { color: #0d6efd !important; }
    .offcanvas-header h5 { font-weight: 600; font-size: 1.2rem; }
    footer { text-align: center; padding: 1rem; font-size: 0.9rem; color: #888; border-top: 1px solid #ddd; margin-top: 2rem; }
    main { padding: 2rem 1rem; }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark fixed-top shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'courses:courses_dashboard' %}">📚 Courses Admin</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#coursesSidebar">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Sidebar -->
    <div class="offcanvas offcanvas-start text-bg-dark" tabindex="-1" id="coursesSidebar">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title">📋 Courses Menu</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
      </div>
      <div class="offcanvas-body">
        <ul class="navbar-nav pe-3">
          <li class="nav-item">
            <a class="nav-link" href="{% url 'courses:courses_dashboard' %}">🏠 Courses Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'courses:add_course' %}">➕ Add Course</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'courses:manage_courses' %}">📝 Manage Courses</a>
          </li>
          <li class="nav-item mt-3">
            <a class="nav-link text-danger fw-bold" href="{% url 'accounts:logout' %}">🚪 Logout</a>
          </li>
        </ul>
      </div>
    </div>
  </div>
</nav>

<!-- Main Content -->
<main class="container">
  {% block body %}
  {% endblock %}
</main>

<!-- Footer -->
<footer>
  &copy; {% now "Y" %} Courses Admin AA. All rights reserved.
</footer>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

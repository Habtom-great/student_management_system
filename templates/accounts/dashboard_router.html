{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f6f8fb;
            font-family: 'Inter', sans-serif;
        }

        .wrapper {
            max-width: 900px;
            margin: 80px auto;
        }

        .title {
            text-align: center;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .card-box {
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            transition: 0.2s ease;
            height: 100%;
        }

        .card-box:hover {
            transform: translateY(-5px);
        }

        .icon {
            font-size: 28px;
            margin-bottom: 10px;
            color: #1d5fb0;
        }

        .btn-enter {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="wrapper">

    <h2 class="title">Choose Your Dashboard</h2>

    <div class="row g-4">

        <!-- ADMIN -->
        <div class="col-md-6">
            <div class="card card-box p-4 text-center">
                <div class="icon">🏛️</div>
                <h5 class="fw-bold">Admin Dashboard</h5>
                <p class="text-muted small">
                    Manage students, courses, instructors, exams, and payments.
                </p>

                <a href="{% url 'admin_dashboard' %}" class="btn btn-primary btn-enter">
                    Enter as Admin
                </a>
            </div>
        </div>

        <!-- INSTRUCTOR -->
        <div class="col-md-6">
            <div class="card card-box p-4 text-center">
                <div class="icon">👨‍🏫</div>
                <h5 class="fw-bold">Instructor Dashboard</h5>
                <p class="text-muted small">
                    View your courses, manage students, and record grades.
                </p>

                <a href="{% url 'instructor_dashboard' %}" class="btn btn-success btn-enter">
                    Enter as Instructor
                </a>
            </div>
        </div>

    </div>

</div>

</body>
</html>

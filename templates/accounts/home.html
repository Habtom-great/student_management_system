<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LMS Home</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        .box {
            text-align: center;
            max-width: 500px;
            padding: 40px;
        }

        .btn-login {
            background: #2563eb;
            padding: 12px 30px;
            border-radius: 10px;
            color: white;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #1d4ed8;
            transform: scale(1.05);
        }

        .subtitle {
            color: #cbd5e1;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>📘 LMS SYSTEM</h1>

    <p class="subtitle">
        Student Management & Learning Platform
    </p>

    <!-- IMPORTANT FIX -->
    <a class="btn-login" href="{% url 'accounts:login' %}">
        Login to Continue
    </a>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LMS Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b);
            font-family:Arial, sans-serif;
        }

        .login-card{
            width:420px;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 25px 60px rgba(0,0,0,.35);
        }

        .logo{
            text-align:center;
            font-size:26px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#64748b;
            margin-bottom:25px;
        }

        .form-control{
            padding:12px;
            border-radius:10px;
        }

        .btn-login{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            font-weight:bold;
        }

        .btn-login:hover{
            background:#1d4ed8;
        }

        .forgot{
            font-size:14px;
            text-decoration:none;
        }

        .forgot:hover{
            text-decoration:underline;
        }

        .footer{
            margin-top:20px;
            text-align:center;
            font-size:12px;
            color:#888;
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="logo">📘 LMS LOGIN</div>
    <div class="subtitle">Sign in with your email</div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <!-- ✅ ONLY ONE FORM -->
<form method="post" action="{% url 'accounts:login' %}">
    {% csrf_token %}

    <div class="mb-3">
        <label>Email</label>
        <input type="email" name="email" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Password</label>
        <input type="password" name="password" class="form-control" required>
    </div>

    <div class="mb-3 form-check">
        <input type="checkbox" name="remember" class="form-check-input">
        <label class="form-check-label">Remember me</label>
    </div>

    <button type="submit" class="btn btn-primary w-100">
        Login
    </button>
</form>

    <div class="footer">
        © 2026 LMS Platform
    </div>

</div>

</body>
</html>

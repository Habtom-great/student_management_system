<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h3 class="mb-3">Edit Student</h3>

        <!-- IMPORTANT: enctype added -->
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- PHOTO PREVIEW -->
            <div class="mb-3 text-center">
                {% if student.photo %}
                    <img src="{{ student.photo.url }}"
                         class="rounded-circle mb-2"
                         width="100"
                         height="100"
                         style="object-fit:cover;">
                {% else %}
                    <div class="rounded-circle bg-secondary text-white d-flex align-items-center justify-content-center mx-auto"
                         style="width:100px;height:100px;">
                        No Image
                    </div>
                {% endif %}
            </div>

            <!-- PHOTO UPLOAD -->
            <div class="mb-3">
                <label>Change Photo</label>
                <input type="file" name="photo" class="form-control">
            </div>

            <div class="row">

                <div class="col-md-4 mb-3">
                    <label>First Name</label>
                    <input type="text" name="first_name" value="{{ student.first_name }}" class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <label>Middle Name</label>
                    <input type="text" name="middle_name" value="{{ student.middle_name }}" class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <label>Last Name</label>
                    <input type="text" name="last_name" value="{{ student.last_name }}" class="form-control">
                </div>

            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" value="{{ student.email }}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Phone</label>
                <input type="text" name="phone" value="{{ student.phone }}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Status</label>
                <select name="status" class="form-control">
                    <option value="Active" {% if student.status == "Active" %}selected{% endif %}>Active</option>
                    <option value="Inactive" {% if student.status == "Inactive" %}selected{% endif %}>Inactive</option>
                </select>
            </div>

            <button class="btn btn-primary">Update</button>
            <a href="/students/" class="btn btn-secondary">Cancel</a>

        </form>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .box {
            background: #3498db;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .box h2 {
            margin: 0;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Student Dashboard</h1>
</div>

<div class="container">

    <div class="grid">

        <div class="box">
            <h2>Courses</h2>
            <p>My Enrolled Courses</p>
        </div>

        <div class="box">
            <h2>Exams</h2>
            <p>View Results</p>
        </div>

        <div class="box">
            <h2>Payments</h2>
            <p>Fee Status</p>
        </div>

    </div>

    <div class="card">
        <h3>Welcome Student</h3>
        <p>This is your dashboard where you can manage courses, exams and payments.</p>
    </div>

</div>

</body>
</html>

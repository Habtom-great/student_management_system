<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .title {
            font-weight: bold;
            color: #2c3e50;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="card p-4">

        <h3 class="title mb-4">➕ Add Student</h3>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="row">
                <div class="col-md-4">
                    <label>First Name</label>
                    {{ form.first_name }}
                </div>

                <div class="col-md-4">
                    <label>Middle Name</label>
                    {{ form.middle_name }}
                </div>

                <div class="col-md-4">
                    <label>Last Name</label>
                    {{ form.last_name }}
                </div>
            </div>

            <div class="row mt-3">
                <div class="col-md-6">
                    <label>Email</label>
                    {{ form.email }}
                </div>

                <div class="col-md-6">
                    <label>Phone</label>
                    {{ form.phone }}
                </div>
            </div>

            <div class="row mt-3">
                <div class="col-md-4">
                    <label>City</label>
                    {{ form.city }}
                </div>

                <div class="col-md-4">
                    <label>Sub City</label>
                    {{ form.sub_city }}
                </div>

                <div class="col-md-4">
                    <label>Woreda</label>
                    {{ form.woreda }}
                </div>
            </div>

            <div class="row mt-3">
                <div class="col-md-6">
                    <label>House Number</label>
                    {{ form.house_number }}
                </div>

                <div class="col-md-3">
                    <label>Status</label>
                    {{ form.status }}
                </div>

                <div class="col-md-3">
                    <label>Photo</label>
                    {{ form.photo }}
                </div>
            </div>

            <button class="btn btn-primary w-100 mt-4">
                Save Student
            </button>

        </form>

    </div>

</div>

</body>
</html>

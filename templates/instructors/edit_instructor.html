{% extends "base.html" %}
{% load static %}

{% block title %}Edit Instructor{% endblock %}

{% block content %}

<div class="container py-4" style="max-width: 800px;">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold mb-0">
            <i class="bi bi-pencil-square text-primary me-2"></i>
            Edit Instructor
        </h4>

        <a href="{% url 'instructors:list' %}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <!-- CARD -->
    <div class="card border-0 shadow-sm rounded-3">
        <div class="card-body p-4">

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="row g-4">

                    <!-- PHOTO -->
                    <div class="col-md-4 text-center">

                        {% if instructor.photo %}
                            <img src="{{ instructor.photo.url }}"
                                 class="rounded-circle shadow-sm mb-2"
                                 width="125" height="140"
                                 style="object-fit: cover;">
                        {% else %}
                            <img src="{% static 'images/default-user.png' %}"
                                 class="rounded-circle shadow-sm mb-2"
                                 width="130" height="140">
                        {% endif %}

                        <input type="file" name="photo" class="form-control form-control-sm mt-2">
                    </div>

                    <!-- FORM FIELDS -->
                    <div class="col-md-8">

                        <div class="mb-2">
                            <label class="form-label small fw-semibold">Full Name</label>
                            <input type="text" name="full_name"
                                   value="{{ instructor.full_name }}"
                                   class="form-control form-control-sm" required>
                        </div>

                        <div class="mb-2">
                            <label class="form-label small fw-semibold">Title</label>
                            <input type="text" name="title"
                                   value="{{ instructor.title }}"
                                   class="form-control form-control-sm">
                        </div>

                        <div class="mb-2">
                            <label class="form-label small fw-semibold">Email</label>
                            <input type="email" name="email"
                                   value="{{ instructor.email }}"
                                   class="form-control form-control-sm">
                        </div>

                        <div class="mb-2">
                            <label class="form-label small fw-semibold">Phone</label>
                            <input type="text" name="phone"
                                   value="{{ instructor.phone }}"
                                   class="form-control form-control-sm">
                        </div>

                        <div class="mb-2">
                            <label class="form-label small fw-semibold">Bio</label>
                            <textarea name="bio" rows="4"
                                      class="form-control form-control-sm">{{ instructor.bio }}</textarea>
                        </div>

                    </div>
                </div>

                <!-- ACTIONS -->
                <div class="d-flex justify-content-end gap-2 mt-4">

                    <a href="{% url 'instructors:delete' instructor.id %}"
                       class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-trash"></i> Delete
                    </a>

                    <button type="submit" class="btn btn-primary btn-sm">
                        <i class="bi bi-save"></i> Save Changes
                    </button>

                </div>

            </form>

        </div>
    </div>

</div>

{% endblock %}

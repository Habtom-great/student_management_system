{% extends "base.html" %}
{% load static %}

{% block title %}Add Instructor{% endblock %}

{% block content %}

<div class="container py-4" style="max-width: 900px;">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h4 class="fw-bold mb-0">
            <i class="bi bi-person-plus me-2 text-primary"></i>
            Add Instructor
        </h4>

        <a href="{% url 'instructors:list' %}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i> Back
        </a>

    </div>

    <!-- FORM CARD -->
    <div class="card border-0 shadow-sm rounded-4">

        <div class="card-body p-4">

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="row g-4">

                    <!-- PHOTO UPLOAD -->
                    <div class="col-md-4 text-center">

                        <img id="preview"
                             src="{% static 'images/default-user.png' %}"
                             class="rounded-circle shadow-sm mb-3"
                             width="140"
                             height="140"
                             style="object-fit:cover;">

                        <input type="file"
                               name="photo"
                               class="form-control form-control-sm"
                               accept="image/*"
                               onchange="previewImage(event)">

                        <div class="form-text mt-2">
                            JPG / PNG recommended
                        </div>

                    </div>

                    <!-- FIELDS -->
                    <div class="col-md-8">

                        <div class="row g-3">

                            <div class="col-12">
                                <label class="form-label">Full Name</label>
                                <input type="text"
                                       name="full_name"
                                       class="form-control"
                                       placeholder="e.g. Dr. Hailu Worku"
                                       required>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Title</label>
                                <input type="text"
                                       name="title"
                                       class="form-control"
                                       placeholder="e.g. Senior Lecturer">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email"
                                       name="email"
                                       class="form-control"
                                       placeholder="email@example.com">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Phone</label>
                                <input type="text"
                                       name="phone"
                                       class="form-control"
                                       placeholder="+251...">
                            </div>

                            <div class="col-12">
                                <label class="form-label">Bio</label>
                                <textarea name="bio"
                                          rows="4"
                                          class="form-control"
                                          placeholder="Short biography..."></textarea>
                            </div>

                        </div>

                    </div>

                </div>

                <!-- BUTTONS -->
                <div class="d-flex justify-content-end gap-2 mt-4">

                    <a href="{% url 'instructors:list' %}"
                       class="btn btn-light">
                        Cancel
                    </a>

                    <button type="submit"
                            class="btn btn-primary px-4">
                        Save Instructor
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<!-- IMAGE PREVIEW SCRIPT -->
<script>
function previewImage(event) {
    const reader = new FileReader();
    reader.onload = function () {
        document.getElementById('preview').src = reader.result;
    }
    reader.readAsDataURL(event.target.files[0]);
}
</script>

{% endblock %}

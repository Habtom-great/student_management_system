<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar — Student Management System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B2A4A;
    --ink-soft:#3C4A68;
    --paper:#EEF1F5;
    --card:#FFFFFF;
    --rule:#D7DCE5;
    --gold:#B9842B;
    --gold-soft:#F1E3C8;
    --teal:#2F6F6B;
    --teal-soft:#DCEDEA;
    --rust:#A23B3B;
    --rust-soft:#F3DEDE;
    --shadow: 0 1px 2px rgba(27,42,74,0.06), 0 8px 24px rgba(27,42,74,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
  }
  ::selection{background:var(--gold-soft);}

  /* layout */
  .app{display:grid;grid-template-columns:248px 1fr;min-height:100vh;}
  @media (max-width:860px){.app{grid-template-columns:1fr;}}

  /* sidebar */
  .sidebar{
    background:var(--ink);
    color:#EDEFF4;
    padding:28px 20px;
    position:sticky; top:0; height:100vh;
    display:flex; flex-direction:column;
  }
  @media (max-width:860px){.sidebar{position:relative; height:auto;}}
  .brand{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:22px;
    letter-spacing:0.2px;
    border-bottom:1px solid rgba(255,255,255,0.15);
    padding-bottom:18px;
    margin-bottom:22px;
  }
  .brand small{
    display:block;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:1.5px;
    color:var(--gold);
    text-transform:uppercase;
    margin-top:4px;
  }
  nav{display:flex; flex-direction:column; gap:4px;}
  .nav-btn{
    display:flex; align-items:center; gap:10px;
    background:none; border:none; color:#C9CEDB;
    font-family:'Inter',sans-serif; font-size:14.5px; font-weight:500;
    text-align:left; padding:11px 12px; border-radius:8px;
    cursor:pointer; transition:background .15s, color .15s;
  }
  .nav-btn .num{
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:rgba(255,255,255,0.4);
    width:18px;
  }
  .nav-btn:hover{background:rgba(255,255,255,0.06); color:#fff;}
  .nav-btn.active{background:var(--gold); color:var(--ink); font-weight:600;}
  .nav-btn.active .num{color:rgba(27,42,74,0.55);}
  .sidebar-foot{
    margin-top:auto; padding-top:18px; border-top:1px solid rgba(255,255,255,0.15);
    font-size:11.5px; color:rgba(255,255,255,0.45); line-height:1.5;
  }

  /* main */
  main{padding:34px 40px 60px; max-width:1180px;}
  @media (max-width:600px){main{padding:22px 16px 40px;}}

  .page-head{display:flex; justify-content:space-between; align-items:flex-end; gap:16px; margin-bottom:26px; flex-wrap:wrap;}
  .page-head h1{
    font-family:'Fraunces',serif; font-weight:600; font-size:30px; margin:0;
  }
  .page-head .sub{color:var(--ink-soft); font-size:13.5px; margin-top:4px;}
  .btn{
    font-family:'Inter',sans-serif; font-weight:600; font-size:13.5px;
    padding:10px 16px; border-radius:8px; border:1px solid transparent;
    cursor:pointer; transition:transform .08s ease, box-shadow .15s;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--ink); color:#fff;}
  .btn-primary:hover{box-shadow:var(--shadow);}
  .btn-ghost{background:transparent; border-color:var(--rule); color:var(--ink);}
  .btn-ghost:hover{background:#fff;}
  .btn-sm{padding:6px 11px; font-size:12.5px; border-radius:6px;}
  .btn-danger{background:transparent; border-color:var(--rust); color:var(--rust);}
  .btn-danger:hover{background:var(--rust-soft);}

  /* dashboard cards */
  .stat-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:30px;}
  @media (max-width:860px){.stat-grid{grid-template-columns:repeat(2,1fr);}}
  .stat-card{
    background:var(--card); border-radius:10px; padding:18px 20px;
    box-shadow:var(--shadow); border-left:3px solid var(--gold);
  }
  .stat-card .label{font-size:11.5px; text-transform:uppercase; letter-spacing:1px; color:var(--ink-soft); font-weight:600;}
  .stat-card .value{font-family:'Fraunces',serif; font-size:30px; font-weight:600; margin-top:6px;}
  .stat-card.teal{border-left-color:var(--teal);}
  .stat-card.rust{border-left-color:var(--rust);}

  .panel{background:var(--card); border-radius:12px; box-shadow:var(--shadow); padding:24px; margin-bottom:24px;}
  .panel h2{font-family:'Fraunces',serif; font-size:18px; margin:0 0 14px;}

  /* ledger table — signature element */
  .ledger{width:100%; border-collapse:collapse; font-size:13.5px;}
  .ledger thead th{
    text-align:left; font-size:11px; letter-spacing:0.8px; text-transform:uppercase;
    color:var(--ink-soft); font-weight:600; padding:0 12px 10px; border-bottom:2px solid var(--ink);
  }
  .ledger tbody tr{border-bottom:1px solid var(--rule);}
  .ledger tbody tr:hover{background:#FAFBFD;}
  .ledger td{padding:12px 12px; vertical-align:middle;}
  .ledger td.entry-no{
    font-family:'IBM Plex Mono',monospace; color:var(--ink-soft); font-size:12px;
    border-left:3px solid var(--gold); padding-left:9px;
  }
  .ledger .name-cell{font-weight:600;}
  .ledger .muted{color:var(--ink-soft); font-size:12.5px;}
  .row-actions{display:flex; gap:6px;}
  .name-with-avatar{display:flex; align-items:center; gap:10px;}

  .pill{
    display:inline-block; padding:3px 10px; border-radius:20px;
    font-size:11.5px; font-weight:600; letter-spacing:.2px;
  }
  .pill-active{background:var(--teal-soft); color:var(--teal);}
  .pill-inactive{background:var(--rust-soft); color:var(--rust);}
  .pill-paid{background:var(--teal-soft); color:var(--teal);}
  .pill-pending{background:var(--gold-soft); color:#8A6315;}
  .pill-overdue{background:var(--rust-soft); color:var(--rust);}
  .grade{font-family:'IBM Plex Mono',monospace; font-weight:500;}

  .toolbar{display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; align-items:center;}
  .search-input, select.filter{
    font-family:'Inter',sans-serif; font-size:13.5px; padding:9px 12px;
    border:1px solid var(--rule); border-radius:8px; background:#fff; color:var(--ink);
  }
  .search-input{flex:1; min-width:180px;}
  .empty-state{
    text-align:center; padding:40px 20px; color:var(--ink-soft);
  }
  .empty-state .glyph{font-family:'Fraunces',serif; font-size:34px; color:var(--gold); margin-bottom:8px;}

  /* avatars */
  .avatar{
    border-radius:50%; object-fit:cover; flex-shrink:0;
    display:inline-flex; align-items:center; justify-content:center;
    background:var(--gold-soft); color:#8A6315; font-family:'Fraunces',serif; font-weight:600;
  }
  .avatar-sm{width:32px; height:32px; font-size:13px;}
  .avatar-lg{width:96px; height:96px; font-size:32px; border:3px solid var(--gold-soft);}

  /* modal */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(27,42,74,0.45);
    display:none; align-items:center; justify-content:center; padding:20px; z-index:50;
  }
  .modal-backdrop.open{display:flex;}
  .modal{
    background:#fff; border-radius:14px; padding:26px 28px; width:100%; max-width:460px;
    box-shadow:0 20px 60px rgba(0,0,0,0.25); max-height:88vh; overflow-y:auto;
  }
  .modal h3{font-family:'Fraunces',serif; font-size:20px; margin:0 0 18px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:5px; text-transform:uppercase; letter-spacing:.4px;}
  .field input, .field select, .field textarea{
    width:100%; padding:9px 11px; border:1px solid var(--rule); border-radius:7px;
    font-family:'Inter',sans-serif; font-size:14px; background:#fcfcfd;
  }
  .field textarea{resize:vertical; min-height:54px;}
  .field input:focus, .field select:focus, .field textarea:focus, .search-input:focus, select.filter:focus{outline:2px solid var(--gold); outline-offset:1px;}
  .modal-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:20px;}

  .photo-row{display:flex; align-items:center; gap:14px; margin-bottom:16px;}
  .photo-row input[type=file]{font-size:12.5px;}
  .checkbox-list{display:flex; flex-direction:column; gap:7px; border:1px solid var(--rule); border-radius:7px; padding:10px 12px; background:#fcfcfd;}
  .checkbox-list label{display:flex; align-items:center; gap:8px; font-size:13.5px; font-weight:400; text-transform:none; letter-spacing:0; color:var(--ink);}
  .checkbox-list input{width:auto;}

  .toast{
    position:fixed; bottom:24px; right:24px; background:var(--ink); color:#fff;
    padding:12px 18px; border-radius:8px; font-size:13.5px; box-shadow:var(--shadow);
    opacity:0; transform:translateY(8px); transition:opacity .2s, transform .2s; z-index:60;
  }
  .toast.show{opacity:1; transform:translateY(0);}
  .hint{font-size:12px; color:var(--ink-soft); margin-top:-4px; margin-bottom:18px;}

  /* profile page */
  .back-link{
    display:inline-flex; align-items:center; gap:6px; background:none; border:none;
    color:var(--ink-soft); font-size:13px; font-weight:600; cursor:pointer; padding:0; margin-bottom:16px;
  }
  .back-link:hover{color:var(--ink);}
  .profile-header{display:flex; gap:20px; align-items:center; flex-wrap:wrap;}
  .profile-header .info h1{font-family:'Fraunces',serif; font-size:26px; margin:0 0 4px;}
  .profile-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:18px;}
  @media (max-width:700px){.profile-grid{grid-template-columns:1fr;}}
  .detail-row{display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--rule); font-size:13.5px;}
  .detail-row:last-child{border-bottom:none;}
  .detail-row .k{color:var(--ink-soft); font-weight:600;}
  .detail-row .v{text-align:right; max-width:65%;}
  .course-card{
    border:1px solid var(--rule); border-radius:9px; padding:12px 14px; margin-bottom:10px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .course-card .code{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--gold); font-weight:600; letter-spacing:.5px;}
  .summary-strip{display:flex; gap:24px; margin-bottom:18px; flex-wrap:wrap;}
  .summary-strip .item .label{font-size:11px; text-transform:uppercase; letter-spacing:.8px; color:var(--ink-soft); font-weight:600;}
  .summary-strip .item .value{font-family:'Fraunces',serif; font-size:24px; font-weight:600;}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">Registrar<small>Ledger No. 0042</small></div>
    <nav id="nav"></nav>
    <div class="sidebar-foot">Data lives in this browser tab only and resets on reload. Export to keep records.</div>
  </aside>

  <main id="main"></main>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modalBox"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------------------------------------------------------
   IN-MEMORY DATA STORE (no browser storage — resets on reload)
--------------------------------------------------------- */
let students = [
  {id:1, name:"Bethlehem Tesfaye", email:"bethlehem.t@example.com", phone:"0911-220-330",
   address:"Bole Sub-City, Woreda 03, House No. 142, Addis Ababa", photo:null,
   courses:[1,2], status:"Active", enrolled:"2025-09-02"},
  {id:2, name:"Yonas Abebe", email:"yonas.a@example.com", phone:"0922-114-887",
   address:"Kirkos Sub-City, Woreda 07, Addis Ababa", photo:null,
   courses:[2], status:"Active", enrolled:"2025-09-04"},
  {id:3, name:"Liya Mekonnen", email:"liya.m@example.com", phone:"0933-556-221",
   address:"Yeka Sub-City, Woreda 11, Addis Ababa", photo:null,
   courses:[1], status:"Inactive", enrolled:"2024-09-12"},
  {id:4, name:"Samuel Girma", email:"samuel.g@example.com", phone:"0944-778-905",
   address:"Arada Sub-City, Woreda 05, Addis Ababa", photo:null,
   courses:[3,1], status:"Active", enrolled:"2025-09-10"},
];

let courses = [
  {id:1, code:"CS101", name:"Introduction to Computer Science", instructor:"Dr. Hailu Worku", credits:4},
  {id:2, code:"MTH210", name:"Linear Algebra", instructor:"Dr. Selam Tadesse", credits:3},
  {id:3, code:"ENG150", name:"Academic Writing", instructor:"Mr. Daniel Bekele", credits:2},
];

let exams = [
  {id:1, student:1, course:1, examName:"Midterm", marks:78, maxMarks:100, date:"2026-03-12"},
  {id:2, student:1, course:2, examName:"Final", marks:88, maxMarks:100, date:"2026-05-20"},
  {id:3, student:2, course:2, examName:"Final", marks:91, maxMarks:100, date:"2026-05-20"},
  {id:4, student:3, course:1, examName:"Midterm", marks:52, maxMarks:100, date:"2026-03-12"},
  {id:5, student:4, course:3, examName:"Quiz 1", marks:34, maxMarks:40, date:"2026-02-18"},
  {id:6, student:4, course:1, examName:"Midterm", marks:69, maxMarks:100, date:"2026-03-12"},
];

let payments = [
  {id:1, student:1, amount:3500, method:"Bank Transfer", date:"2026-01-15", status:"Paid"},
  {id:2, student:2, amount:3500, method:"Cash", date:"2026-01-18", status:"Paid"},
  {id:3, student:3, amount:3500, method:"Bank Transfer", date:"2026-02-01", status:"Pending"},
  {id:4, student:4, amount:1800, method:"Mobile Money", date:"2025-12-20", status:"Overdue"},
];

let nextId = {students:5, courses:4, exams:7, payments:5};
let state = {page:"dashboard", search:"", filter:"all", profileId:null};

/* ---------------------------------------------------------
   HELPERS
--------------------------------------------------------- */
const $ = sel => document.querySelector(sel);
const courseById = id => courses.find(c => c.id === id);
const studentById = id => students.find(s => s.id === id);
const fmtMoney = n => "ETB " + Number(n).toLocaleString();

function gradeFor(marks, max){
  const pct = (marks/max)*100;
  if(pct>=90) return "A";
  if(pct>=80) return "B";
  if(pct>=70) return "C";
  if(pct>=60) return "D";
  return "F";
}

function initials(name){
  return name.split(" ").filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join("");
}

function avatarHTML(student, size){
  const cls = size === "lg" ? "avatar-lg" : "avatar-sm";
  if(student.photo){
    return `<img class="avatar ${cls}" src="${student.photo}" alt="Photo of ${student.name}">`;
  }
  return `<div class="avatar ${cls}">${initials(student.name)}</div>`;
}

function coursesLabel(student){
  if(!student.courses || !student.courses.length) return "—";
  return student.courses.map(id => courseById(id)?.code).filter(Boolean).join(", ") || "—";
}

function toast(msg){
  const t = $("#toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=> t.classList.remove("show"), 2200);
}

function closeModal(){ $("#modalBackdrop").classList.remove("open"); $("#modalBox").innerHTML=""; }

function openModal(html){
  $("#modalBox").innerHTML = html;
  $("#modalBackdrop").classList.add("open");
}

document.addEventListener("click", e=>{
  if(e.target.id === "modalBackdrop") closeModal();
});

/* ---------------------------------------------------------
   NAVIGATION
--------------------------------------------------------- */
const NAV_ITEMS = [
  {key:"dashboard", label:"Dashboard", num:"00"},
  {key:"students", label:"Students", num:"01"},
  {key:"courses", label:"Courses", num:"02"},
  {key:"exams", label:"Exams", num:"03"},
  {key:"payments", label:"Payments", num:"04"},
];

function renderNav(){
  const nav = $("#nav");
  const activeKey = state.page === "profile" ? "students" : state.page;
  nav.innerHTML = NAV_ITEMS.map(item => `
    <button class="nav-btn ${activeKey===item.key?'active':''}" data-page="${item.key}">
      <span class="num">${item.num}</span>${item.label}
    </button>
  `).join("");
  nav.querySelectorAll(".nav-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      state.page = btn.dataset.page;
      state.search = ""; state.filter = "all"; state.profileId = null;
      render();
    });
  });
}

/* ---------------------------------------------------------
   RENDER ROUTER
--------------------------------------------------------- */
function render(){
  renderNav();
  const main = $("#main");
  if(state.page==="dashboard") main.innerHTML = renderDashboard();
  if(state.page==="students") main.innerHTML = renderStudents();
  if(state.page==="courses") main.innerHTML = renderCourses();
  if(state.page==="exams") main.innerHTML = renderExams();
  if(state.page==="payments") main.innerHTML = renderPayments();
  if(state.page==="profile") main.innerHTML = renderProfile();
  bindPageEvents();
}

/* ---------------------------------------------------------
   DASHBOARD
--------------------------------------------------------- */
function renderDashboard(){
  const totalRevenue = payments.filter(p=>p.status==="Paid").reduce((s,p)=>s+p.amount,0);
  const pendingCount = payments.filter(p=>p.status!=="Paid").length;
  const recent = [...students].sort((a,b)=> b.enrolled.localeCompare(a.enrolled)).slice(0,5);

  return `
    <div class="page-head">
      <div>
        <h1>Dashboard</h1>
        <div class="sub">An overview of enrollment, coursework, and dues — Ledger updated locally.</div>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-card"><div class="label">Total Students</div><div class="value">${students.length}</div></div>
      <div class="stat-card teal"><div class="label">Active Courses</div><div class="value">${courses.length}</div></div>
      <div class="stat-card"><div class="label">Exams Recorded</div><div class="value">${exams.length}</div></div>
      <div class="stat-card rust"><div class="label">Payments Due</div><div class="value">${pendingCount}</div></div>
    </div>

    <div class="panel">
      <h2>Revenue collected to date</h2>
      <div style="font-family:'Fraunces',serif; font-size:32px; font-weight:600; color:var(--teal);">${fmtMoney(totalRevenue)}</div>
    </div>

    <div class="panel">
      <h2>Recently enrolled</h2>
      <table class="ledger">
        <thead><tr><th>Entry</th><th>Name</th><th>Courses</th><th>Enrolled</th><th>Status</th></tr></thead>
        <tbody>
          ${recent.map(s=>`
            <tr>
              <td class="entry-no">#${String(s.id).padStart(4,'0')}</td>
              <td class="name-cell">
                <div class="name-with-avatar">${avatarHTML(s,"sm")}<span>${s.name}</span></div>
              </td>
              <td class="muted">${coursesLabel(s)}</td>
              <td class="muted">${s.enrolled}</td>
              <td><span class="pill ${s.status==='Active'?'pill-active':'pill-inactive'}">${s.status}</span></td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;
}

/* ---------------------------------------------------------
   STUDENTS
--------------------------------------------------------- */
function filteredStudents(){
  let list = students;
  if(state.search){
    const q = state.search.toLowerCase();
    list = list.filter(s => s.name.toLowerCase().includes(q) || s.email.toLowerCase().includes(q));
  }
  if(state.filter !== "all"){
    list = list.filter(s => s.status === state.filter);
  }
  return list;
}

function renderStudents(){
  const list = filteredStudents();
  return `
    <div class="page-head">
      <div><h1>Students</h1><div class="sub">${students.length} records on file</div></div>
      <button class="btn btn-primary" id="addStudentBtn">+ Add Student</button>
    </div>

    <div class="panel">
      <div class="toolbar">
        <input class="search-input" id="studentSearch" placeholder="Search by name or email…" value="${state.search}">
        <select class="filter" id="studentFilter">
          <option value="all" ${state.filter==='all'?'selected':''}>All statuses</option>
          <option value="Active" ${state.filter==='Active'?'selected':''}>Active</option>
          <option value="Inactive" ${state.filter==='Inactive'?'selected':''}>Inactive</option>
        </select>
      </div>

      ${list.length ? `
      <table class="ledger">
        <thead><tr><th>Entry</th><th>Name</th><th>Contact</th><th>Courses</th><th>Enrolled</th><th>Status</th><th></th></tr></thead>
        <tbody>
          ${list.map(s=>`
            <tr>
              <td class="entry-no">#${String(s.id).padStart(4,'0')}</td>
              <td class="name-cell">
                <div class="name-with-avatar">${avatarHTML(s,"sm")}<span>${s.name}</span></div>
              </td>
              <td class="muted">${s.email}<br>${s.phone}</td>
              <td class="muted">${coursesLabel(s)}</td>
              <td class="muted">${s.enrolled}</td>
              <td><span class="pill ${s.status==='Active'?'pill-active':'pill-inactive'}">${s.status}</span></td>
              <td>
                <div class="row-actions">
                  <button class="btn btn-ghost btn-sm" data-view="${s.id}">View</button>
                  <button class="btn btn-ghost btn-sm" data-edit="${s.id}">Edit</button>
                  <button class="btn btn-danger btn-sm" data-del="${s.id}">Delete</button>
                </div>
              </td>
            </tr>
          `).join("")}
        </tbody>
      </table>
      ` : emptyState("No students match", "Try a different search or add a new record.")}
    </div>
  `;
}

function studentFormHTML(student){
  const isEdit = !!student;
  const selectedCourses = student?.courses || [];
  return `
    <h3>${isEdit ? "Edit Student" : "Add Student"}</h3>

    <div class="photo-row">
      <div id="photoPreview">${avatarHTML(student || {name:"New Student", photo:null}, "lg")}</div>
      <div>
        <label style="display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;">Photo</label>
        <input type="file" id="f_photo" accept="image/*">
        <div class="hint" style="margin-top:6px;">JPG or PNG. Stored only in this session.</div>
      </div>
    </div>

    <div class="field"><label>Full Name</label><input id="f_name" value="${student?.name||''}"></div>
    <div class="field"><label>Email</label><input id="f_email" value="${student?.email||''}"></div>
    <div class="field"><label>Phone</label><input id="f_phone" value="${student?.phone||''}"></div>
    <div class="field"><label>Address</label><textarea id="f_address">${student?.address||''}</textarea></div>
    <div class="field"><label>Courses Enrolled</label>
      <div class="checkbox-list">
        ${courses.map(c=>`
          <label><input type="checkbox" value="${c.id}" ${selectedCourses.includes(c.id)?'checked':''}> ${c.code} — ${c.name}</label>
        `).join("")}
      </div>
    </div>
    <div class="field"><label>Status</label>
      <select id="f_status">
        <option ${student?.status==='Active'?'selected':''}>Active</option>
        <option ${student?.status==='Inactive'?'selected':''}>Inactive</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancelModal">Cancel</button>
      <button class="btn btn-primary" id="saveStudent">${isEdit ? "Save Changes" : "Add Student"}</button>
    </div>
  `;
}

function bindStudentModal(editId){
  const student = editId ? studentById(editId) : null;
  openModal(studentFormHTML(student));
  $("#cancelModal").onclick = closeModal;

  let pendingPhoto = student?.photo || null;
  $("#f_photo").onchange = e=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev=>{
      pendingPhoto = ev.target.result;
      $("#photoPreview").innerHTML = `<img class="avatar avatar-lg" src="${pendingPhoto}" alt="Preview">`;
    };
    reader.readAsDataURL(file);
  };

  $("#saveStudent").onclick = ()=>{
    const name = $("#f_name").value.trim();
    const email = $("#f_email").value.trim();
    if(!name || !email){ toast("Name and email are required."); return; }
    const selectedCourses = Array.from(document.querySelectorAll(".checkbox-list input:checked")).map(cb=>Number(cb.value));
    const data = {
      name, email,
      phone: $("#f_phone").value.trim(),
      address: $("#f_address").value.trim(),
      courses: selectedCourses,
      status: $("#f_status").value,
      photo: pendingPhoto,
    };
    if(student){
      Object.assign(student, data);
      toast("Student record updated.");
    } else {
      students.push({id: nextId.students++, enrolled: new Date().toISOString().slice(0,10), ...data});
      toast("Student added.");
    }
    closeModal();
    render();
  };
}

/* ---------------------------------------------------------
   STUDENT PROFILE
--------------------------------------------------------- */
function renderProfile(){
  const s = studentById(state.profileId);
  if(!s){
    return `<button class="back-link" id="backToStudents">&larr; Back to Students</button>${emptyState("Student not found", "This record may have been deleted.")}`;
  }
  const studentExams = exams.filter(e => e.student === s.id);
  const avgPct = studentExams.length
    ? studentExams.reduce((sum,e)=> sum + (e.marks/e.maxMarks)*100, 0) / studentExams.length
    : null;

  return `
    <button class="back-link" id="backToStudents">&larr; Back to Students</button>

    <div class="panel">
      <div class="profile-header">
        ${avatarHTML(s,"lg")}
        <div class="info">
          <h1>${s.name}</h1>
          <span class="pill ${s.status==='Active'?'pill-active':'pill-inactive'}">${s.status}</span>
          <span class="muted" style="margin-left:8px;">Entry #${String(s.id).padStart(4,'0')} · Enrolled ${s.enrolled}</span>
        </div>
        <div style="margin-left:auto; display:flex; gap:8px;">
          <button class="btn btn-ghost btn-sm" id="profileEditBtn">Edit Profile</button>
        </div>
      </div>

      <div class="profile-grid">
        <div>
          <h2 style="font-family:'Fraunces',serif;font-size:15px;margin:18px 0 6px;">Contact &amp; Address</h2>
          <div class="detail-row"><span class="k">Email</span><span class="v">${s.email}</span></div>
          <div class="detail-row"><span class="k">Phone</span><span class="v">${s.phone || "—"}</span></div>
          <div class="detail-row"><span class="k">Address</span><span class="v">${s.address || "—"}</span></div>
        </div>
        <div>
          <h2 style="font-family:'Fraunces',serif;font-size:15px;margin:18px 0 6px;">Courses Taken</h2>
          ${(s.courses && s.courses.length) ? s.courses.map(cid=>{
            const c = courseById(cid);
            if(!c) return "";
            return `<div class="course-card">
                <div><div class="name-cell" style="font-size:13.5px;">${c.name}</div><div class="code">${c.code} · ${c.instructor}</div></div>
                <div class="muted">${c.credits} cr</div>
              </div>`;
          }).join("") : `<div class="muted">No courses enrolled yet.</div>`}
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>Grade Report</h2>
      <div class="summary-strip">
        <div class="item"><div class="label">Exams Taken</div><div class="value">${studentExams.length}</div></div>
        <div class="item"><div class="label">Average Score</div><div class="value">${avgPct===null ? "—" : avgPct.toFixed(1)+"%"}</div></div>
        <div class="item"><div class="label">Overall Grade</div><div class="value">${avgPct===null ? "—" : gradeFor(avgPct,100)}</div></div>
      </div>

      ${studentExams.length ? `
      <table class="ledger">
        <thead><tr><th>Entry</th><th>Course</th><th>Exam</th><th>Score</th><th>Grade</th><th>Date</th></tr></thead>
        <tbody>
          ${studentExams.map(e=>{
            const co = courseById(e.course);
            const g = gradeFor(e.marks, e.maxMarks);
            return `
            <tr>
              <td class="entry-no">#${String(e.id).padStart(4,'0')}</td>
              <td class="name-cell">${co?.code || "—"}</td>
              <td class="muted">${e.examName}</td>
              <td class="grade">${e.marks}/${e.maxMarks}</td>
              <td><span class="pill ${g==='F'?'pill-overdue':'pill-active'}">${g}</span></td>
              <td class="muted">${e.date}</td>
            </tr>
          `}).join("")}
        </tbody>
      </table>
      ` : emptyState("No exam results yet", "Results recorded for this student will appear here.")}
    </div>
  `;
}

/* ---------------------------------------------------------
   COURSES
--------------------------------------------------------- */
function renderCourses(){
  let list = courses;
  if(state.search){
    const q = state.search.toLowerCase();
    list = list.filter(c => c.name.toLowerCase().includes(q) || c.code.toLowerCase().includes(q));
  }
  return `
    <div class="page-head">
      <div><h1>Courses</h1><div class="sub">${courses.length} courses offered</div></div>
      <button class="btn btn-primary" id="addCourseBtn">+ Add Course</button>
    </div>
    <div class="panel">
      <div class="toolbar">
        <input class="search-input" id="courseSearch" placeholder="Search by name or code…" value="${state.search}">
      </div>
      ${list.length ? `
      <table class="ledger">
        <thead><tr><th>Entry</th><th>Code</th><th>Course</th><th>Instructor</th><th>Credits</th><th>Enrolled</th><th></th></tr></thead>
        <tbody>
          ${list.map(c=>`
            <tr>
              <td class="entry-no">#${String(c.id).padStart(4,'0')}</td>
              <td class="grade">${c.code}</td>
              <td class="name-cell">${c.name}</td>
              <td class="muted">${c.instructor}</td>
              <td class="muted">${c.credits}</td>
              <td class="muted">${students.filter(s=> (s.courses||[]).includes(c.id)).length}</td>
              <td>
                <div class="row-actions">
                  <button class="btn btn-ghost btn-sm" data-edit-course="${c.id}">Edit</button>
                  <button class="btn btn-danger btn-sm" data-del-course="${c.id}">Delete</button>
                </div>
              </td>
            </tr>
          `).join("")}
        </tbody>
      </table>
      ` : emptyState("No courses match", "Try a different search or add a new course.")}
    </div>
  `;
}

function courseFormHTML(course){
  const isEdit = !!course;
  return `
    <h3>${isEdit ? "Edit Course" : "Add Course"}</h3>
    <div class="field"><label>Course Code</label><input id="f_code" value="${course?.code||''}" placeholder="e.g. CS101"></div>
    <div class="field"><label>Course Name</label><input id="f_cname" value="${course?.name||''}"></div>
    <div class="field"><label>Instructor</label><input id="f_instructor" value="${course?.instructor||''}"></div>
    <div class="field"><label>Credits</label><input id="f_credits" type="number" min="1" max="6" value="${course?.credits||3}"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancelModal">Cancel</button>
      <button class="btn btn-primary" id="saveCourse">${isEdit ? "Save Changes" : "Add Course"}</button>
    </div>
  `;
}

function bindCourseModal(editId){
  const course = editId ? courseById(editId) : null;
  openModal(courseFormHTML(course));
  $("#cancelModal").onclick = closeModal;
  $("#saveCourse").onclick = ()=>{
    const code = $("#f_code").value.trim();
    const name = $("#f_cname").value.trim();
    if(!code || !name){ toast("Code and name are required."); return; }
    const data = { code, name, instructor: $("#f_instructor").value.trim(), credits: Number($("#f_credits").value)||3 };
    if(course){ Object.assign(course, data); toast("Course updated."); }
    else { courses.push({id: nextId.courses++, ...data}); toast("Course added."); }
    closeModal(); render();
  };
}

/* ---------------------------------------------------------
   EXAMS
--------------------------------------------------------- */
function renderExams(){
  let list = exams;
  if(state.filter !== "all"){
    list = list.filter(e => e.course === Number(state.filter));
  }
  return `
    <div class="page-head">
      <div><h1>Exams</h1><div class="sub">${exams.length} results recorded</div></div>
      <button class="btn btn-primary" id="addExamBtn">+ Record Result</button>
    </div>
    <div class="panel">
      <div class="toolbar">
        <select class="filter" id="examFilter">
          <option value="all">All courses</option>
          ${courses.map(c=>`<option value="${c.id}" ${state.filter===String(c.id)?'selected':''}>${c.code}</option>`).join("")}
        </select>
      </div>
      ${list.length ? `
      <table class="ledger">
        <thead><tr><th>Entry</th><th>Student</th><th>Course</th><th>Exam</th><th>Score</th><th>Grade</th><th>Date</th><th></th></tr></thead>
        <tbody>
          ${list.map(e=>{
            const st = studentById(e.student);
            const co = courseById(e.course);
            const g = gradeFor(e.marks, e.maxMarks);
            return `
            <tr>
              <td class="entry-no">#${String(e.id).padStart(4,'0')}</td>
              <td class="name-cell">
                ${st ? `<div class="name-with-avatar">${avatarHTML(st,"sm")}<span>${st.name}</span></div>` : "—"}
              </td>
              <td class="muted">${co?.code || "—"}</td>
              <td class="muted">${e.examName}</td>
              <td class="grade">${e.marks}/${e.maxMarks}</td>
              <td><span class="pill ${g==='F'?'pill-overdue':'pill-active'}">${g}</span></td>
              <td class="muted">${e.date}</td>
              <td>
                <div class="row-actions">
                  <button class="btn btn-ghost btn-sm" data-edit-exam="${e.id}">Edit</button>
                  <button class="btn btn-danger btn-sm" data-del-exam="${e.id}">Delete</button>
                </div>
              </td>
            </tr>
          `}).join("")}
        </tbody>
      </table>
      ` : emptyState("No exam results yet", "Record a result to see it appear here.")}
    </div>
  `;
}

function examFormHTML(exam){
  const isEdit = !!exam;
  return `
    <h3>${isEdit ? "Edit Result" : "Record Result"}</h3>
    <div class="field"><label>Student</label>
      <select id="f_student">${students.map(s=>`<option value="${s.id}" ${exam?.student===s.id?'selected':''}>${s.name}</option>`).join("")}</select>
    </div>
    <div class="field"><label>Course</label>
      <select id="f_ecourse">${courses.map(c=>`<option value="${c.id}" ${exam?.course===c.id?'selected':''}>${c.code} — ${c.name}</option>`).join("")}</select>
    </div>
    <div class="field"><label>Exam Name</label><input id="f_examname" value="${exam?.examName||''}" placeholder="e.g. Midterm"></div>
    <div class="field"><label>Marks Obtained</label><input id="f_marks" type="number" min="0" value="${exam?.marks??''}"></div>
    <div class="field"><label>Maximum Marks</label><input id="f_maxmarks" type="number" min="1" value="${exam?.maxMarks??100}"></div>
    <div class="field"><label>Date</label><input id="f_examdate" type="date" value="${exam?.date || new Date().toISOString().slice(0,10)}"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancelModal">Cancel</button>
      <button class="btn btn-primary" id="saveExam">${isEdit ? "Save Changes" : "Record Result"}</button>
    </div>
  `;
}

function bindExamModal(editId){
  const exam = editId ? exams.find(e=>e.id===editId) : null;
  openModal(examFormHTML(exam));
  $("#cancelModal").onclick = closeModal;
  $("#saveExam").onclick = ()=>{
    const marks = Number($("#f_marks").value);
    const maxMarks = Number($("#f_maxmarks").value);
    if(isNaN(marks) || isNaN(maxMarks) || maxMarks<=0){ toast("Enter valid marks."); return; }
    const data = {
      student: Number($("#f_student").value),
      course: Number($("#f_ecourse").value),
      examName: $("#f_examname").value.trim() || "Untitled Exam",
      marks, maxMarks,
      date: $("#f_examdate").value,
    };
    if(exam){ Object.assign(exam, data); toast("Result updated."); }
    else { exams.push({id: nextId.exams++, ...data}); toast("Result recorded."); }
    closeModal(); render();
  };
}

/* ---------------------------------------------------------
   PAYMENTS
--------------------------------------------------------- */
function renderPayments(){
  let list = payments;
  if(state.filter !== "all"){
    list = list.filter(p => p.status === state.filter);
  }
  return `
    <div class="page-head">
      <div><h1>Payments</h1><div class="sub">${payments.length} transactions on record</div></div>
      <button class="btn btn-primary" id="addPaymentBtn">+ Record Payment</button>
    </div>
    <div class="panel">
      <div class="toolbar">
        <select class="filter" id="paymentFilter">
          <option value="all" ${state.filter==='all'?'selected':''}>All statuses</option>
          <option value="Paid" ${state.filter==='Paid'?'selected':''}>Paid</option>
          <option value="Pending" ${state.filter==='Pending'?'selected':''}>Pending</option>
          <option value="Overdue" ${state.filter==='Overdue'?'selected':''}>Overdue</option>
        </select>
      </div>
      ${list.length ? `
      <table class="ledger">
        <thead><tr><th>Entry</th><th>Student</th><th>Amount</th><th>Method</th><th>Date</th><th>Status</th><th></th></tr></thead>
        <tbody>
          ${list.map(p=>{
            const st = studentById(p.student);
            const pillClass = p.status==='Paid'?'pill-paid':p.status==='Pending'?'pill-pending':'pill-overdue';
            return `
            <tr>
              <td class="entry-no">#${String(p.id).padStart(4,'0')}</td>
              <td class="name-cell">
                ${st ? `<div class="name-with-avatar">${avatarHTML(st,"sm")}<span>${st.name}</span></div>` : "—"}
              </td>
              <td class="grade">${fmtMoney(p.amount)}</td>
              <td class="muted">${p.method}</td>
              <td class="muted">${p.date}</td>
              <td><span class="pill ${pillClass}">${p.status}</span></td>
              <td>
                <div class="row-actions">
                  <button class="btn btn-ghost btn-sm" data-edit-payment="${p.id}">Edit</button>
                  <button class="btn btn-danger btn-sm" data-del-payment="${p.id}">Delete</button>
                </div>
              </td>
            </tr>
          `}).join("")}
        </tbody>
      </table>
      ` : emptyState("No payments match", "Try a different filter or record a new payment.")}
    </div>
  `;
}

function paymentFormHTML(payment){
  const isEdit = !!payment;
  return `
    <h3>${isEdit ? "Edit Payment" : "Record Payment"}</h3>
    <div class="field"><label>Student</label>
      <select id="f_pstudent">${students.map(s=>`<option value="${s.id}" ${payment?.student===s.id?'selected':''}>${s.name}</option>`).join("")}</select>
    </div>
    <div class="field"><label>Amount (ETB)</label><input id="f_amount" type="number" min="0" value="${payment?.amount??''}"></div>
    <div class="field"><label>Method</label>
      <select id="f_method">
        ${["Cash","Bank Transfer","Mobile Money","Card"].map(m=>`<option ${payment?.method===m?'selected':''}>${m}</option>`).join("")}
      </select>
    </div>
    <div class="field"><label>Date</label><input id="f_paydate" type="date" value="${payment?.date || new Date().toISOString().slice(0,10)}"></div>
    <div class="field"><label>Status</label>
      <select id="f_pstatus">
        ${["Paid","Pending","Overdue"].map(s=>`<option ${payment?.status===s?'selected':''}>${s}</option>`).join("")}
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancelModal">Cancel</button>
      <button class="btn btn-primary" id="savePayment">${isEdit ? "Save Changes" : "Record Payment"}</button>
    </div>
  `;
}

function bindPaymentModal(editId){
  const payment = editId ? payments.find(p=>p.id===editId) : null;
  openModal(paymentFormHTML(payment));
  $("#cancelModal").onclick = closeModal;
  $("#savePayment").onclick = ()=>{
    const amount = Number($("#f_amount").value);
    if(isNaN(amount) || amount<=0){ toast("Enter a valid amount."); return; }
    const data = {
      student: Number($("#f_pstudent").value),
      amount,
      method: $("#f_method").value,
      date: $("#f_paydate").value,
      status: $("#f_pstatus").value,
    };
    if(payment){ Object.assign(payment, data); toast("Payment updated."); }
    else { payments.push({id: nextId.payments++, ...data}); toast("Payment recorded."); }
    closeModal(); render();
  };
}

/* ---------------------------------------------------------
   SHARED EMPTY STATE
--------------------------------------------------------- */
function emptyState(title, sub){
  return `<div class="empty-state"><div class="glyph">§</div><div style="font-weight:600;color:var(--ink);">${title}</div><div style="font-size:12.5px;margin-top:4px;">${sub}</div></div>`;
}

/* ---------------------------------------------------------
   PAGE EVENT BINDING (search, filters, CRUD buttons)
--------------------------------------------------------- */
function bindPageEvents(){
  // Students
  if($("#addStudentBtn")) $("#addStudentBtn").onclick = ()=> bindStudentModal();
  if($("#studentSearch")) $("#studentSearch").oninput = e=>{ state.search = e.target.value; render(); $("#studentSearch").focus(); $("#studentSearch").setSelectionRange(state.search.length, state.search.length); };
  if($("#studentFilter")) $("#studentFilter").onchange = e=>{ state.filter = e.target.value; render(); };
  document.querySelectorAll("[data-view]").forEach(b=> b.onclick = ()=>{
    state.profileId = Number(b.dataset.view); state.page = "profile"; render();
  });
  document.querySelectorAll("[data-edit]").forEach(b=> b.onclick = ()=> bindStudentModal(Number(b.dataset.edit)));
  document.querySelectorAll("[data-del]").forEach(b=> b.onclick = ()=>{
    if(confirm("Delete this student record? This cannot be undone.")){
      students = students.filter(s=>s.id!==Number(b.dataset.del));
      toast("Student deleted."); render();
    }
  });

  // Profile page
  if($("#backToStudents")) $("#backToStudents").onclick = ()=>{ state.page = "students"; state.profileId = null; render(); };
  if($("#profileEditBtn")) $("#profileEditBtn").onclick = ()=> bindStudentModal(state.profileId);

  // Courses
  if($("#addCourseBtn")) $("#addCourseBtn").onclick = ()=> bindCourseModal();
  if($("#courseSearch")) $("#courseSearch").oninput = e=>{ state.search = e.target.value; render(); $("#courseSearch").focus(); $("#courseSearch").setSelectionRange(state.search.length, state.search.length); };
  document.querySelectorAll("[data-edit-course]").forEach(b=> b.onclick = ()=> bindCourseModal(Number(b.dataset.editCourse)));
  document.querySelectorAll("[data-del-course]").forEach(b=> b.onclick = ()=>{
    if(confirm("Delete this course? Linked students and exams will keep referencing it as removed.")){
      courses = courses.filter(c=>c.id!==Number(b.dataset.delCourse));
      toast("Course deleted."); render();
    }
  });

  // Exams
  if($("#addExamBtn")) $("#addExamBtn").onclick = ()=> bindExamModal();
  if($("#examFilter")) $("#examFilter").onchange = e=>{ state.filter = e.target.value; render(); };
  document.querySelectorAll("[data-edit-exam]").forEach(b=> b.onclick = ()=> bindExamModal(Number(b.dataset.editExam)));
  document.querySelectorAll("[data-del-exam]").forEach(b=> b.onclick = ()=>{
    if(confirm("Delete this exam result?")){
      exams = exams.filter(e=>e.id!==Number(b.dataset.delExam));
      toast("Result deleted."); render();
    }
  });

  // Payments
  if($("#addPaymentBtn")) $("#addPaymentBtn").onclick = ()=> bindPaymentModal();
  if($("#paymentFilter")) $("#paymentFilter").onchange = e=>{ state.filter = e.target.value; render(); };
  document.querySelectorAll("[data-edit-payment]").forEach(b=> b.onclick = ()=> bindPaymentModal(Number(b.dataset.editPayment)));
  document.querySelectorAll("[data-del-payment]").forEach(b=> b.onclick = ()=>{
    if(confirm("Delete this payment record?")){
      payments = payments.filter(p=>p.id!==Number(b.dataset.delPayment));
      toast("Payment deleted."); render();
    }
  });
}

render();
</script>
</body>
</html>

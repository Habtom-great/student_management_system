{% extends 'base.html' %}
{% load static %}

{% block title %}Add New Notice{% endblock %}

{% block body %}
<section class="py-5" style="margin-top: 80px;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card bg-light shadow-lg border-0">
          <div class="card-header bg-primary text-white text-center rounded-top">
            <h4 class="mb-0">📝 Add New Notice</h4>
          </div>
          <div class="card-body bg-white p-4">
            <form method="post">
              {% csrf_token %}
              <div class="mb-3">
                <label for="title" class="form-label fw-bold">📌 Title</label>
                <input type="text" class="form-control form-control-lg border-primary" name="title" id="title" placeholder="Enter notice title..." required>
              </div>
              <div class="mb-3">
                <label for="content" class="form-label fw-bold">🗒️ Content</label>
                <textarea class="form-control border-primary" name="content" id="content" rows="6" placeholder="Write the notice content..." required></textarea>
              </div>
              <div class="d-grid">
                <button type="submit" class="btn btn-success btn-lg">
                  ✅ Submit Notice
                </button>
              </div>
            </form>
          </div>
          <div class="card-footer text-center text-muted small">
            Notices will be visible to all students once published.
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}

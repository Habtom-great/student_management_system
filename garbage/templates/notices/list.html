<!DOCTYPE html>
<html>
<head>
    <title>Public Notices</title>
</head>
<body>
    <h1>Public Notices</h1>
    {% for notice in notices %}
        <div>
            <h2>{{ notice.title }}</h2>
            <p>{{ notice.content }}</p>
        </div>
    {% empty %}
        <p>No public notices at the moment.</p>
    {% endfor %}
</body>
</html>

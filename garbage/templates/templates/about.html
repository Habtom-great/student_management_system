{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
  <h2 class="text-center text-primary">About Us</h2>
  <div class="mt-4">
    {% for about in aboutDetails %}
      <p>{{ about.about|linebreaks }}</p>
    {% empty %}
      <p>No about information available at the moment.</p>
    {% endfor %}
  </div>
</div>
{% endblock %}

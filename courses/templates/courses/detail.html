{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ course.course_title }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <h2 class="text-primary fw-bold">{{ course.course_title }}</h2>
    <p class="lead text-muted">{{ course.course_subtitle }}</p>

    <img src="{{ course.thumb_image.url }}" alt="Course Thumbnail" class="img-fluid mb-4" style="border-radius: 12px; max-height: 300px; object-fit: cover;">

    <div class="mb-4">
      <h5 class="fw-bold">Course Description </h5>
      <p>{{ course.description }}</p>
    </div>

    <div class="d-flex align-items-center mb-3">
      <img src="{{ course.tutor_image.url }}" class="rounded-circle me-3" width="60" height="60" alt="{{ course.tutor_name }}">
      <div>
        <h6 class="mb-0">{{ course.tutor_name }}</h6>
        <small class="text-muted">Instructor</small>
      </div>
    </div>

    <a href="{% url 'courses:course_list' %}" class="btn btn-secondary mt-4">← Back to All Courses</a>
  </div>
</body>
</html>

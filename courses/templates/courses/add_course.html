<!-- templates/courses/add_course.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add New Course</title>
    <!-- Bootstrap CSS CDN (optional, for styling) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
</head>
<body>
<div class="container mt-5" style="max-width: 600px;">
    <h2 class="mb-4">Add New Course</h2>

    <!-- Messages -->
    {% if messages %}
      <div>
        {% for message in messages %}
          <div class="alert alert-success" role="alert">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="mb-3">
            <label for="course_id" class="form-label">Course ID</label>
            <input type="text" class="form-control" id="course_id" name="course_id" required />
        </div>

        <div class="mb-3">
            <label for="course_title" class="form-label">Course Title</label>
            <input type="text" class="form-control" id="course_title" name="course_title" required />
        </div>

        <div class="mb-3">
            <label for="subtitle" class="form-label">Subtitle</label>
            <input type="text" class="form-control" id="subtitle" name="subtitle" />
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea class="form-control" id="description" name="description" rows="4"></textarea>
        </div>

        <div class="mb-3">
            <label for="instructor" class="form-label">Instructor</label>
            <input type="text" class="form-control" id="instructor" name="instructor" />
        </div>

        <div class="mb-3">
            <label for="department" class="form-label">Department</label>
            <input type="text" class="form-control" id="department" name="department" />
        </div>

        <div class="mb-3">
            <label for="photo" class="form-label">Instructor Photo</label>
            <input class="form-control" type="file" id="photo" name="photo" />
        </div>

        <button type="submit" class="btn btn-primary">Add Course</button>
    </form>
</div>

<!-- Optional Bootstrap JS for better UI -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ course.course_title }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container my-5">
    <div class="row g-4">
      <div class="col-md-6">
        <img src="{{ course.thumb_image.url }}" alt="{{ course.course_title }}" class="img-fluid rounded-3 shadow">
      </div>
      <div class="col-md-6">
        <h2 class="text-primary">{{ course.course_title }}</h2>
        <p class="text-muted">{{ course.course_subtitle }}</p>
        <p>{{ course.description }}</p>

        <div class="mt-4 d-flex align-items-center">
          <img src="{{ course.tutor_image.url }}" alt="{{ course.tutor_name }}" class="rounded-circle me-3" width="60" height="60">
          <div>
            <h5 class="mb-0">{{ course.tutor_name }}</h5>
            <small class="text-muted">Instructor</small>
          </div>
        </div>

        <p class="mt-4"><strong>Created At:</strong> {{ course.created_at|date:"F d, Y" }}</p>
        <a href="{% url 'courses:course_list' %}" class="btn btn-secondary mt-3">⬅ Back to All Courses vvv</a>
      </div>
    </div>
  </div>
</body>
</html>

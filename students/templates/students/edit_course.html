{% for course in courses %}
  {% if course.id %}
  <tr>
    <td>{{ forloop.counter }}</td>
    <td>{{ course.name }}</td>
    <td>{{ course.code }}</td>
    <td>{{ course.description|truncatewords:10 }}</td>
    <td>{{ course.duration_months }} months</td>
    <td>{{ course.fee }}</td>
    <td>
      <a href="{% url 'edit_course' course.id %}" class="btn btn-sm btn-warning me-1">
        <i class="bi bi-pencil-square"></i> Edit
      </a>
      <a href="{% url 'delete_course' course.id %}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this course?');">
        <i class="bi bi-trash"></i> Delete
      </a>
    </td>
  </tr>
  {% else %}
  <tr>
    <td colspan="6" class="text-danger">Invalid course entry (missing ID)</td>
  </tr>
  {% endif %}
{% endfor %}

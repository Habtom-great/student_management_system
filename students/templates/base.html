<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}GITC Student System{% endblock %}</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Font Awesome CSS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, #f0f2f5, #e4efff);
      padding-top: 75px;
      min-height: 100vh;
      margin: 0;
    }

    .navbar {
      background: linear-gradient(90deg, #004080, #0073e6);
    }

    .navbar-brand {
      font-weight: 700;
      color: #fff;
      text-decoration: none;
    }

    .navbar-brand:hover,
    .nav-link:hover {
      color: #ffd700 !important;
      text-decoration: none;
    }

    .nav-link {
      color: #fff !important;
      font-weight: 500;
    }

    main {
      padding: 20px 15px;
      min-height: 70vh;
    }

    footer {
      background-color: #002f5f;
      color: #fff;
      padding: 20px 0;
      text-align: center;
      margin-top: 60px;
      font-size: 0.9rem;
    }

    footer a {
      color: #fff;
      margin: 0 10px;
      transition: color 0.3s ease;
    }

    footer a:hover,
    footer a:focus {
      color: #ffd700;
      text-decoration: none;
    }

    .tutor-img {
      max-width: 60px;
      height: auto;
      border-radius: 50%;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg fixed-top shadow">
    <div class="container">
      <a class="navbar-brand" href="{% url 'home' %}" aria-label="Go to homepage">
        <i class="fas fa-graduation-cap me-2"></i>GITC Student Portal PPPPPP
      </a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">

          <li class="nav-item">
            <a class="nav-link" href="{% url 'dashboard' %}">
              <i class="fas fa-home me-1"></i> Home
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="{% url 'courses:course_list' %}">
              <i class="bi bi-journal-text me-2"></i> Courses
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="{% url 'students_dashboard' %}">
              <i class="fas fa-user-graduate me-1"></i> Students
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="{% url 'exams_dashboard' %}">
              <i class="fas fa-pen-alt me-1"></i> Exams
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="{% url 'payments:payments_dashboard' %}">
              <i class="fas fa-credit-card me-1"></i> Payments
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="/admin/">
              <i class="fas fa-cogs me-1"></i> Admin
            </a>
          </li>

        </ul>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container-fluid">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer>
    <div class="container">
      <p>&copy; 2025 <strong>Gerar Isaac Training Center</strong>. All rights reserved hhhh.</p>
      <div>
        <a href="#" aria-label="Facebook"><i class="fab fa-facebook fa-lg"></i></a>
        <a href="#" aria-label="Telegram"><i class="fab fa-telegram fa-lg"></i></a>
        <a href="#" aria-label="YouTube"><i class="fab fa-youtube fa-lg"></i></a>
        <a href="#" aria-label="WhatsApp"><i class="fab fa-whatsapp fa-lg"></i></a>
      </div>
    </div>
  </footer>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
